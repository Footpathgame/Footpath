<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Footpath Centurion</title>
<style>
:root{--bg:#eef1f3;--panel:#fff;--panel2:#f5f7f8;--line:#d8dde2;--text:#14191f;--muted:#6c747d;--dark:#3d4650;--accent:#13a37f;--bad:#b64747;--good:#2e7a4b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;padding:14px}
.app{max-width:790px;margin:auto}
.header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:10px}
h1{margin:0;font-size:31px;letter-spacing:-1px} .sub{font-size:13px;color:var(--muted);margin-top:3px}
.best{text-align:right;color:var(--accent);font-weight:800;font-size:13px} .best b{display:block;font-size:31px;line-height:1}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:0 5px 20px rgba(30,40,50,.05)}
.topstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--panel2);border:1px solid #e0e4e7;border-radius:8px;padding:9px;text-align:center;font-size:11px;color:var(--muted)}
.stat b{display:block;font-size:20px;color:var(--text);margin-top:2px}
.progress{height:10px;background:#e4e8eb;border-radius:10px;overflow:hidden;margin:12px 0 5px} .progress i{display:block;height:100%;background:var(--dark)}
.clues{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.clue{display:flex;align-items:center;gap:11px;background:#f7f8f9;border:1px solid #dde2e6;padding:12px;border-radius:9px}
.flag{font-size:24px;width:32px;text-align:center} .clubicon{width:31px;height:31px;border-radius:50%;border:1px solid rgba(0,0,0,.2);flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.35)}
.clue b{font-size:16px} .small{font-size:12px;color:var(--muted);margin-top:2px}
.action{display:flex;gap:8px;margin-top:14px;position:relative} input{flex:1;min-width:0;border:1px solid #c8ced4;border-radius:8px;padding:13px;font:inherit}
button{border:1px solid #c7cdd3;background:#fff;color:#20262d;border-radius:8px;padding:11px 15px;font:inherit;font-weight:800;cursor:pointer}
button.primary{background:var(--dark);border-color:var(--dark);color:#fff;min-width:102px} button.restart{background:var(--accent);border-color:var(--accent);color:#fff}
.suggestions{position:absolute;left:0;right:110px;top:50px;background:#fff;border:1px solid #ccd2d8;border-radius:8px;max-height:230px;overflow:auto;z-index:5;display:none;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.suggestions.show{display:block} .suggestion{padding:10px 12px;border-bottom:1px solid #eceff1;cursor:pointer} .suggestion:hover{background:#f2f4f5}
.feedback{display:none;margin-top:12px;border-radius:9px;padding:13px;border:1px solid} .feedback.show{display:block}
.feedback.correct{background:#edf7f0;border-color:#b7d9c0} .feedback.wrong{background:#fbefef;border-color:#dfb8b8}
.feedback h2{margin:0 0 5px;font-size:22px} .career{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px} .career span{background:#fff;border:1px solid #d9dee2;border-radius:18px;padding:7px 9px;font-size:12px}
.end{display:none;text-align:center;padding:20px 5px} .end.show{display:block} .end h2{font-size:30px;margin:0 0 8px}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:5px}
@media(max-width:600px){.topstats{grid-template-columns:repeat(2,1fr)}.action{flex-direction:column}button.primary{width:100%}.suggestions{right:0;top:51px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>FOOTPATH</h1><div class="sub">The Centurion — identify 100 footballers before 50 mistakes.</div></div>
    <div class="best">PERSONAL BEST<b id="bestScore">0</b></div>
  </div>

  <div class="card">
    <div id="gameArea">
      <div class="topstats">
        <div class="stat">SCORE<b id="score">0</b></div>
        <div class="stat">PLAYER<b><span id="playerNo">1</span>/100</b></div>
        <div class="stat">MISTAKES LEFT<b id="lives">50</b></div>
        <div class="stat">RUNS<b id="runs">0</b></div>
      </div>
      <div class="progress"><i id="progressFill"></i></div>
      <div class="meta"><span id="runId"></span><span>Progress saves automatically</span></div>
      <div id="clues" class="clues"></div>

      <div class="action">
        <input id="guessInput" autocomplete="off" placeholder="First name, surname or full name">
        <button id="actionBtn" class="primary" onclick="handleAction()">Guess</button>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div id="feedback" class="feedback">
        <h2 id="feedbackTitle"></h2>
        <div id="feedbackText"></div>
        <div id="career" class="career"></div>
      </div>
    </div>

    <div id="endScreen" class="end">
      <h2 id="endTitle">Run complete</h2>
      <p id="endText"></p>
      <button class="restart" onclick="newRun()">Start a new run</button>
    </div>
  </div>
</div>

n", "Harte", "Ian Harte"], "nation": "Ireland", "flag": "🇮🇪", "position": "Defender", "clubs": [["Leeds United", 0], ["Levante", 0], ["Reading", 0]]}, {"name": "Marek Hamsik", "aliases": ["Marek", "Hamsik", "Marek Hamsik"], "nation": "Slovakia", "flag": "🇸🇰", "position": "Midfielder", "clubs": [["Brescia", 0], ["Napoli", 0], ["Trabzonspor", 0]]}, {"name": "Martin Skrtel", "aliases": ["Martin", "Skrtel", "Martin Skrtel"], "nation": "Slovakia", "flag": "🇸🇰", "position": "Defender", "clubs": [["Zenit", 0], ["Liverpool", 0], ["Fenerbahce", 0]]}, {"name": "Stanislav Lobotka", "aliases": ["Stanislav", "Lobotka", "Stanislav Lobotka"], "nation": "Slovakia", "flag": "🇸🇰", "position": "Midfielder", "clubs": [["Celta Vigo", 0], ["Napoli", 0]]}, {"name": "Milan Skriniar", "aliases": ["Milan", "Skriniar", "Milan Skriniar"], "nation": "Slovakia", "flag": "🇸🇰", "position": "Defender", "clubs": [["Sampdoria", 0], ["Inter Milan", 0], ["PSG", 0]]}, {"name": "Tomas Rosicky", "aliases": ["Tomas", "Rosicky", "Tomas Rosicky"], "nation": "Czech Republic", "flag": "🇨🇿", "position": "Midfielder", "clubs": [["Sparta Prague", 0], ["Borussia Dortmund", 0], ["Arsenal", 0]]}, {"name": "Patrik Schick", "aliases": ["Patrik", "Schick", "Patrik Schick"], "nation": "Czech Republic", "flag": "🇨🇿", "position": "Forward", "clubs": [["Sampdoria", 0], ["Roma", 0], ["Bayer Leverkusen", 0]]}, {"name": "Tomas Soucek", "aliases": ["Tomas", "Soucek", "Tomas Soucek"], "nation": "Czech Republic", "flag": "🇨🇿", "position": "Midfielder", "clubs": [["Slavia Prague", 0], ["West Ham", 0]]}];
const RUN_SIZE=100, START_LIVES=50, SAVE_KEY='footpathCenturionV1', STATS_KEY='footpathCenturionStatsV1';
const clubStyles={
"Arsenal":"linear-gradient(90deg,#d71920 0 40%,#fff 40% 60%,#d71920 60%)",
"Barcelona":"linear-gradient(90deg,#173f8a 0 50%,#8c1f3d 50%)",
"Chelsea":"radial-gradient(circle,#fff 0 28%,#1753a3 29%)",
"Liverpool":"radial-gradient(circle,#d71920 0 72%,#fff 73% 81%,#d71920 82%)",
"Tottenham":"linear-gradient(90deg,#fff 0 38%,#14264b 38% 62%,#fff 62%)",
"Manchester United":"linear-gradient(90deg,#d71920 0 38%,#111 38% 62%,#d71920 62%)",
"Manchester City":"radial-gradient(circle,#fff 0 28%,#69b9e6 29%)",
"Newcastle":"repeating-linear-gradient(90deg,#111 0 7px,#fff 7px 14px)",
"Juventus":"repeating-linear-gradient(90deg,#fff 0 8px,#111 8px 16px)",
"AC Milan":"repeating-linear-gradient(90deg,#111 0 7px,#d71920 7px 14px)",
"Inter Milan":"repeating-linear-gradient(90deg,#111 0 7px,#15439b 7px 14px)",
"Real Madrid":"radial-gradient(circle,#d7a51b 0 27%,#fff 28% 75%,#d7a51b 76% 83%,#fff 84%)",
"PSG":"linear-gradient(90deg,#152b57 0 38%,#d51e33 38% 62%,#152b57 62%)",
"Atletico Madrid":"repeating-linear-gradient(90deg,#d71920 0 7px,#fff 7px 14px)",
"Bayern Munich":"repeating-linear-gradient(90deg,#d71920 0 7px,#fff 7px 14px)",
"Ajax":"linear-gradient(90deg,#fff 0 35%,#d71920 35% 65%,#fff 65%)",
"Celtic":"repeating-linear-gradient(0deg,#fff 0 7px,#159447 7px 14px)",
"Borussia Dortmund":"repeating-linear-gradient(90deg,#f1d21a 0 8px,#111 8px 16px)"
};
let stats=JSON.parse(localStorage.getItem(STATS_KEY)||'{"best":0,"runs":0}');
let state=loadState(), answered=false;

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim()}
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return Math.abs(h)}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function newState(){const order=shuffle([...Array(players.length).keys()]).slice(0,RUN_SIZE);return {order,index:0,score:0,lives:START_LIVES,runId:Math.floor(1000+Math.random()*9000)}}
function loadState(){const raw=localStorage.getItem(SAVE_KEY);if(!raw)return newState();try{const s=JSON.parse(raw);if(!s.order||s.index>=RUN_SIZE||s.lives<=0)return newState();return s}catch{return newState()}}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));localStorage.setItem(STATS_KEY,JSON.stringify(stats))}
function current(){return players[state.order[state.index]]}
function clubStyle(n){if(clubStyles[n])return clubStyles[n];const h=hash(n),a=`hsl(${h%360} 48% 40%)`,b=`hsl(${(h+100)%360} 45% 78%)`;return `linear-gradient(90deg,${a} 0 42%,${b} 42% 58%,${a} 58%)`}
function icon(n){return `<span class="clubicon" style="background:${clubStyle(n)}"></span>`}
function render(){
 const p=current();bestScore.textContent=stats.best;score.textContent=state.score;playerNo.textContent=state.index+1;lives.textContent=state.lives;runs.textContent=stats.runs;
 progressFill.style.width=(state.index/RUN_SIZE*100)+'%';runId.textContent='Run #'+state.runId;
 clues.innerHTML=`<div class="clue"><div class="flag">${p.flag}</div><div><b>${p.nation}</b><div class="small">${p.position}</div></div></div>`+
 p.clubs.slice(0,3).map(c=>`<div class="clue">${icon(c[0])}<div><b>${c[0]}</b></div></div>`).join('');
 feedback.className='feedback';feedback.innerHTML='<h2 id="feedbackTitle"></h2><div id="feedbackText"></div><div id="career" class="career"></div>';
 guessInput.value='';guessInput.disabled=false;actionBtn.textContent='Guess';answered=false;guessInput.focus();save()
}
function accepted(p,v){const n=normalize(v),opts=[p.name,...p.aliases].map(normalize);if(opts.includes(n))return true;return opts.some(o=>levenshtein(n,o)<=Math.max(1,Math.floor(o.length/7)))}
function levenshtein(a,b){const m=[];for(let i=0;i<=b.length;i++)m[i]=[i];for(let j=0;j<=a.length;j++)m[0][j]=j;for(let i=1;i<=b.length;i++)for(let j=1;j<=a.length;j++)m[i][j]=b.charAt(i-1)==a.charAt(j-1)?m[i-1][j-1]:Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1);return m[b.length][a.length]}
function handleAction(){if(answered)return nextPlayer();submit()}
function submit(){
 const raw=guessInput.value.trim();if(!raw)return;
 const p=current(),ok=accepted(p,raw);answered=true;guessInput.disabled=true;suggestions.classList.remove('show');
 if(ok){state.score++;feedback.className='feedback show correct';feedback.innerHTML=`<h2>Correct — ${p.name}</h2><div>Score: <b>${state.score}</b></div><div class="career">${p.clubs.map(c=>`<span>${c[0]}</span>`).join('')}</div>`}
 else{state.lives--;feedback.className='feedback show wrong';feedback.innerHTML=`<h2>Wrong — ${p.name}</h2><div>You guessed <b>${raw}</b>. Mistakes remaining: <b>${state.lives}</b></div><div class="career">${p.clubs.map(c=>`<span>${c[0]}</span>`).join('')}</div>`}
 actionBtn.textContent=state.lives<=0||state.index>=RUN_SIZE-1?'Finish run':'Next player';save()
}
function nextPlayer(){
 if(state.lives<=0||state.index>=RUN_SIZE-1)return finishRun();
 state.index++;render()
}
function finishRun(){
 stats.runs++;const isBest=state.score>stats.best;if(isBest)stats.best=state.score;save();
 localStorage.removeItem(SAVE_KEY);gameArea.style.display='none';endScreen.classList.add('show');
 endTitle.textContent=isBest?'NEW PERSONAL BEST':'RUN COMPLETE';
 endText.innerHTML=`Final score: <b>${state.score} / 100</b><br>Mistakes used: <b>${START_LIVES-state.lives} / 50</b>`;
 bestScore.textContent=stats.best;runs.textContent=stats.runs
}
function newRun(){state=newState();endScreen.classList.remove('show');gameArea.style.display='block';render()}
function suggest(){
 const q=normalize(guessInput.value);if(q.length<2){suggestions.classList.remove('show');return}
 const hits=players.filter(p=>normalize(p.name).includes(q)).slice(0,8);
 suggestions.innerHTML=hits.map(p=>`<div class="suggestion" onclick="pick('${p.name.replace(/'/g,"\'")}')">${p.name}</div>`).join('');
 suggestions.classList.toggle('show',hits.length>0)
}
function pick(n){guessInput.value=n;suggestions.classList.remove('show')}
guessInput.addEventListener('input',suggest);guessInput.addEventListener('keydown',e=>{if(e.key==='Enter')handleAction()});
render();
</script>
