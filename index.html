<style>
:root{--bg:#f2f3f5;--panel:#fff;--line:#d8dce1;--text:#202832;--muted:#6e7681;--accent:#566170;--good:#2e7d46;--bad:#a54545}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;padding:14px}
.app{max-width:800px;margin:auto} h1{margin:0;font-size:32px;letter-spacing:-1px}
.header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
.sub,.muted{color:var(--muted)} button,input{font:inherit}
button{border:1px solid #c8ced5;background:white;border-radius:7px;padding:10px 13px;font-weight:700;cursor:pointer}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)} button.good{background:var(--good);color:#fff;border-color:var(--good)}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:15px;box-shadow:0 4px 18px rgba(20,30,40,.05)}
.tabs{display:flex;gap:7px;margin-bottom:10px} .tabs button.active{background:var(--accent);color:#fff}
.meta{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.progress{height:9px;background:#e5e8ec;border-radius:10px;overflow:hidden;margin:10px 0} .progress i{display:block;height:100%;background:#657180}
.clues{display:flex;flex-direction:column;gap:9px;margin-top:14px} .clue{display:flex;align-items:center;gap:10px;background:#f8f9fa;border:1px solid #e1e5e9;padding:11px;border-radius:8px}
.club-icon{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,.2);flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.35)}
.flag{font-size:24px;width:30px;text-align:center} .small{font-size:12px}
.inputrow{display:flex;gap:8px;margin-top:14px;position:relative} input{flex:1;min-width:0;border:1px solid #c9ced5;border-radius:7px;padding:12px}
.suggestions{position:absolute;left:0;right:88px;top:48px;background:#fff;border:1px solid #cbd1d7;border-radius:7px;max-height:220px;overflow:auto;z-index:5;display:none}
.suggestions.show{display:block} .suggestion{padding:9px 11px;border-bottom:1px solid #eceff2;cursor:pointer} .suggestion:hover{background:#f3f5f7}
.guesses{margin-top:11px;display:flex;flex-direction:column;gap:6px} .guess{display:flex;justify-content:space-between;padding:9px 11px;border-radius:7px;border:1px solid #e1e5e9;background:#fafafa}
.guess.wrong{background:#fbf1f1;border-color:#e0bcbc} .guess.correct{background:#eef7f0;border-color:#b9d9c1}
.result{display:none;margin-top:14px;background:#f8fafb;border:1px solid #cbd3db;padding:14px;border-radius:9px} .result.show{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px} .stat{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center} .stat b{display:block;font-size:22px}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.inputrow{flex-direction:column}.suggestions{right:0;top:48px}}
</style>

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim()}
function dateKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return Math.abs(h)}
function shuffledIndices(seed){let a=[...Array(players.length).keys()],x=seed||1;for(let i=a.length-1;i>0;i--){x=(x*1664525+1013904223)>>>0;const j=x%(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function loadChallenge(){
 const key='footpathChallenge-'+dateKey();let c=JSON.parse(localStorage.getItem(key)||'null');
 if(!c){c={key,order:shuffledIndices(hash(dateKey()+'challenge')).slice(0,CHALLENGE_SIZE),done:[],cursor:0,totalScore:0};localStorage.setItem(key,JSON.stringify(c))}
 return c
}
function saveChallenge(){localStorage.setItem(challenge.key,JSON.stringify(challenge))}
function setMode(m){mode=m;dailyTab.classList.toggle('active',m==='daily');challengeTab.classList.toggle('active',m==='challenge');challengeProgress.style.display=m==='challenge'?'block':'none';nextBtn.style.display=m==='challenge'?'inline-block':'none';if(m==='daily')start(players[hash(dateKey())%players.length]);else startNextUnused()}
function startNextUnused(){
 while(challenge.cursor<challenge.order.length&&challenge.done.includes(challenge.order[challenge.cursor]))challenge.cursor++;
 if(challenge.cursor>=challenge.order.length){result.classList.add('show');resultTitle.textContent='Challenge complete';resultBody.innerHTML=`<p>You completed all 200 players.</p><p><b>Total score: ${challenge.totalScore}</b></p>`;guessInput.disabled=true;guessBtn.disabled=true;return}
 start(players[challenge.order[challenge.cursor]])
}
function start(p){puzzle=p;revealed=2;wrong=0;ended=false;currentScore=100;guesses=[];guessInput.disabled=false;guessBtn.disabled=false;guessInput.value='';result.classList.remove('show');render()}
function clubStyle(name){if(clubStyles[name])return clubStyles[name];const h=hash(name),a=`hsl(${h%360} 55% 42%)`,b=`hsl(${(h+95)%360} 55% 78%)`;return `linear-gradient(90deg,${a} 0 42%,${b} 42% 58%,${a} 58%)`}
function icon(n){return `<span class="club-icon" style="background:${clubStyle(n)}"></span>`}
function render(){
 modeLabel.textContent=mode==='daily'?'Daily puzzle':'200 Player Challenge';left.textContent=Math.max(0,5-wrong);score.textContent=currentScore;
 clues.innerHTML=`<div class="clue"><div class="flag">${puzzle.flag}</div><div><b>${puzzle.nation}</b><div class="small muted">${puzzle.position}</div></div></div>`+
 puzzle.clubs.slice(0,revealed).map((c,i)=>`<div class="clue">${icon(c[0])}<div><b>${c[0]}</b><div class="small muted">${wrong>=2||i>=3?c[1]+' appearances':'Appearance total hidden'}</div></div></div>`).join('');
 guessList.innerHTML=guesses.map(g=>`<div class="guess ${g.ok?'correct':'wrong'}"><span>${g.text}</span><b>${g.ok?'✓':'×'}</b></div>`).join('');
 playedStat.textContent=stats.played;wonStat.textContent=stats.won;bestStat.textContent=stats.best;streakStat.textContent=stats.streak;
 doneCount.textContent=challenge.done.length;remainCount.textContent=CHALLENGE_SIZE-challenge.done.length;progressFill.style.width=(challenge.done.length/CHALLENGE_SIZE*100)+'%'
}
function correct(v){const n=normalize(v);return [puzzle.name,...puzzle.aliases].map(normalize).includes(n)}

function finish(won){
 ended=true;guessInput.disabled=true;guessBtn.disabled=true;stats.played++;if(won){stats.won++;stats.best=Math.max(stats.best,currentScore)}
 if(mode==='daily'){const today=dateKey();if(won&&stats.lastDaily!==today)stats.streak++;if(!won&&stats.lastDaily!==today)stats.streak=0;stats.lastDaily=today}
 if(mode==='challenge'){const idx=challenge.order[challenge.cursor];if(!challenge.done.includes(idx))challenge.done.push(idx);challenge.totalScore+=won?currentScore:0;challenge.cursor++;saveChallenge()}
 localStorage.setItem('footpathStats2',JSON.stringify(stats));
 resultTitle.textContent=won?'Correct — '+puzzle.name:'It was '+puzzle.name;
 resultBody.innerHTML=`<p>${puzzle.flag} ${puzzle.nation} · ${puzzle.position}</p><p><b>Score: ${won?currentScore:0}</b></p>`+puzzle.clubs.map(c=>`<div class="clue" style="margin-top:7px">${icon(c[0])}<div><b>${c[0]}</b><div class="small muted">${c[1]} appearances</div></div></div>`).join('');
